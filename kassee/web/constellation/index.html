<head>

<title>KasSigner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,300;0,400;1,300&family=IBM+Plex+Mono:wght@300;400&family=Rubik:wght@400;500;600&family=Oswald:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
* { cursor: auto; }
body.moved * { cursor: none !important; }
body.touch-device, body.touch-device * { cursor: none !important; }
body.touch-device canvas { cursor: none !important; }

:root {
  --ground:   #0e0f0c;
  --ink:      #c8d4bc;
  --ink-dim:  #4a5a42;
  --ink-faint:#1e2419;
  --teal:     #1D9E75;
  --teal-dim: #0d5c42;
  --teal-pale:#9fcfbc;
  --seal:     #8b3a2a;
}

html, body {
  width: 100%; height: 100%;
  background: var(--ground);
  overflow: hidden;
  font-family: 'Noto Serif', serif;
}

/* grain */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 900;
  opacity: 0.4;
}

canvas { position: fixed; inset: 0; transition: opacity 0.7s ease; }

/* cursor */
#cur {
  position: fixed;
  width: 22px; height: 22px;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%,-50%);
  transition: transform 0.08s ease, opacity 0.3s ease;
}
#cur.dn { transform: translate(-50%,-50%) scale(0.75); }

/* screens */
.screen {
  position: fixed; inset: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.8s ease;
  z-index: 10;
}
.screen.on { opacity: 1; pointer-events: all; }

/* intro */
#s-intro {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 0;
}
@keyframes ink { from { opacity:0; filter:blur(8px); } to { opacity:1; filter:blur(0); } }
.i1 { animation: ink 1s 0.1s both; }
.i2 { animation: ink 1s 0.3s both; }
.i3 { animation: ink 1s 0.5s both; }
.i4 { animation: ink 1s 0.7s both; }
.i5 { animation: ink 1s 0.9s both; }

.eyebrow {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--teal-dim);
  text-transform: uppercase;
  margin-bottom: 40px;
}
.title {
  font-size: clamp(3.5rem, 9vw, 7.5rem);
  font-weight: 300;
  font-style: italic;
  color: var(--ink);
  line-height: 1;
  letter-spacing: -0.02em;
}
.title b { color: var(--teal); font-style: normal; font-weight: 400; }
.sub {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--ink-dim);
  letter-spacing: 0.2em;
  margin-top: 28px;
  margin-bottom: 64px;
}
.tagline {
  font-size: clamp(0.85rem, 1.3vw, 1rem);
  color: var(--ink-dim);
  font-style: italic;
  line-height: 1.9;
  max-width: 420px;
}
.enter {
  margin-top: 60px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.25em;
  color: var(--teal-dim);
  text-transform: uppercase;
  animation: pulse 2.8s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.2} 50%{opacity:0.8} }

/* act screen */
#s-act {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0;
  overflow-y: auto;
  overflow-x: hidden;
  /* bottom padding protects compass — 180px safe zone */
  padding-bottom: 180px;
}

.act-wrap {
  width: 100%;
  max-width: 860px;
  padding: 60px 8vw 0;
  flex-shrink: 0;
}

#act-diagram {
  display: none;
  width: 100%;
  max-width: none;
  padding: 32px 168px 0 48px;
}

.act-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.25em;
  color: var(--teal-dim);
  text-transform: uppercase;
  margin-bottom: 24px;
}
.act-title {
  font-size: clamp(1.6rem, 3.5vw, 2.4rem);
  font-weight: 300;
  font-style: italic;
  color: var(--ink);
  line-height: 1.15;
  margin-bottom: 32px;
}
.act-title em { color: var(--teal); font-style: normal; }
.act-body {
  font-size: clamp(0.9rem, 1.3vw, 1rem);
  color: var(--ink-dim);
  line-height: 2.1;
  max-width: 580px;
  margin-bottom: 24px;
}
.act-body strong { color: var(--ink); font-weight: 400; }
.act-rule { width: 36px; height: 1px; background: var(--teal); opacity: 0.5; margin: 32px 0; }
.act-quote {
  border-left: 1px solid var(--teal-dim);
  padding-left: 20px;
  font-style: italic;
  font-size: clamp(0.95rem,1.4vw,1.1rem);
  color: var(--ink);
  line-height: 1.9;
  max-width: 500px;
  margin: 32px 0;
}

/* mini constellation compass */
#mini-map {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 120px;
  height: 120px;
  z-index: 500;
  opacity: 0;
  transition: opacity 0.6s ease, transform 1.4s cubic-bezier(0.22,1,0.36,1);
  transform: scale(0.85);
  transform-origin: bottom right;
}
#mini-map.on {
  opacity: 1;
  transform: scale(1);
}
#mini-map.on:hover {
  transform: scale(2);
  transform-origin: bottom right;
  transition: opacity 0.6s ease, transform 0.5s cubic-bezier(0.22,1,0.36,1);
}
#mini-canvas { width: 120px; height: 120px; border-radius: 50%; }

/* nav hint — always left side, never overlaps compass */
#hint {
  position: fixed;
  bottom: 28px;
  left: 32px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--teal-dim);
  text-transform: uppercase;
  z-index: 400;
  transition: opacity 0.5s, color 0.3s;
  opacity: 0;
  padding: 6px 14px;
  border: 1px solid var(--ink-faint);
  border-radius: 20px;
}
#hint:hover { color: var(--teal-pale); border-color: var(--teal-dim); }

/* tool tips */
.tool-tip {
  position: relative;
  color: var(--teal);
  border-bottom: 1px dotted var(--teal-dim);
  cursor: help;
  transition: color 0.2s;
}
.tool-tip:hover { color: var(--teal-pale); }
.tool-tip .tip-box {
  position: absolute;
  bottom: calc(100% + 10px);
  left: 50%;
  transform: translateX(-50%);
  width: max(220px, 40vw);
  max-width: 340px;
  padding: 14px 16px;
  background: #0a0f0a;
  border: 1px solid var(--teal-dim);
  border-radius: 8px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-style: normal;
  font-weight: 300;
  line-height: 1.7;
  color: var(--ink);
  letter-spacing: 0;
  text-transform: none;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s ease;
  z-index: 600;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}
.tool-tip:hover .tip-box,
.tool-tip.active .tip-box {
  opacity: 1;
  pointer-events: auto;
}
.tip-box::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 6px solid transparent;
  border-top-color: var(--teal-dim);
}
</style>
</head>

<script>
// ── touch device detection ─────────────────────────────
document.addEventListener('touchstart', function onFirstTouch() {
  document.body.classList.add('touch-device');
  document.removeEventListener('touchstart', onFirstTouch);
}, { passive: true });
// also detect on load for iPad
if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
  document.body.classList.add('touch-device');
}

// ── cursor ──────────────────────────────────────────────
const cur = document.getElementById('cur');
const isTouch = document.body.classList.contains('touch-device');
cur.style.opacity = '0';
if (isTouch) cur.style.display = 'none';
let MX = -200, MY = -200;
document.addEventListener('mousemove', e => {
  if (document.body.classList.contains('touch-device')) return;
  MX = e.clientX; MY = e.clientY;
  cur.style.left = MX + 'px';
  cur.style.top  = MY + 'px';
  if (cur.style.opacity === '0') {
    cur.style.opacity = '1';
    document.body.classList.add('moved');

    body: `
      <p class="act-body" style="animation:ink 0.8s 0.2s both">In 2008, Satoshi Nakamoto published a paper and solved a problem nobody thought was solvable — commoditized data, no middle man. Proof of work. A chain of blocks. One block at a time, one miner wins, everyone else throws their work away.</p>
      <p class="act-body" style="animation:ink 0.8s 0.28s both">And at the heart of it — miners. Miners are nodes. They validate transactions, enforce the rules, and build the chain. No miners, no consensus. No consensus, no network. No network, nothing. Every block you see exists because someone spent energy to produce it. That energy is the security. That is what proof of work means.</p>

      <p class="act-body" style="animation:ink 0.8s 0.2s both">One key signs. What if you need two? Or three out of five?</p>
      <p class="act-body" style="animation:ink 0.8s 0.3s both"><span class="tool-tip">Multisig<span class="tip-box">M-of-N multi-signature. Multiple co-signers each contribute a public key to create a shared address. M of the N keys must sign to spend funds. A 2-of-3 setup means any two of three keyholders can authorize a transaction — no single point of failure.</span></span> is the answer. <strong>KasSigner</strong> supports M-of-N multisig — the first air-gapped implementation on the Kaspa network.</p>

      <p class="act-body" style="animation:ink 0.8s 0.2s both">Every Kaspa transaction starts with a question: what do you own?</p>
      <p class="act-body" style="animation:ink 0.8s 0.3s both">The answer lives on the network — in what are called unspent outputs, or UTXOs. Think of them as sealed envelopes, each one containing an amount and a lock. The lock is your public key. Only your private key can open it.</p>
      <div class="act-rule" style="animation:ink 0.8s 0.4s both"></div>

      <p class="act-body" style="animation:ink 0.8s 0.55s both">KasSee runs locally on your machine as a WebAssembly application — files you can verify against a hash published in the repository. No server, no cloud, nothing phoning home. And the node it connects to is your choice — by default a public one, but you can point it at your own. Your node, your view of what you own.</p>

    title: 'From source code\nto <em>signing device</em>.',
    body: `
      <p class="act-body" style="animation:ink 0.8s 0.2s both">You do not need to be a developer. You need a computer, a USB-C cable, and an <strong>ESP32-S3 board</strong> — either the Waveshare ESP32-S3 Touch LCD 2" or the M5Stack CoreS3. That is the entire bill of materials.</p>
      <p class="act-body" style="animation:ink 0.8s 0.3s both">The code lives on GitHub — open, auditable, versioned. Getting it onto your device takes three steps. The first one is optional. But it is the whole point.</p>
      <div class="act-rule" style="animation:ink 0.8s 0.38s both"></div>
      <p class="act-body" style="animation:ink 0.8s 0.42s both"><strong>First — verify.</strong> Clone the repository. Inside is a Dockerfile that freezes every component of the build: the exact Ubuntu version, the exact Rust compiler, every dependency pinned in Cargo.lock. Run <strong>docker build</strong> on any machine — macOS, Linux, Windows — and it produces a firmware binary with a SHA-256 hash. Compare that hash to the one published in the release notes. If they match, the binary was built from that source code. Nothing else.</p>
      <p class="act-body" style="animation:ink 0.8s 0.54s both">The firmware embeds its own hash — the device checks it at every boot. That creates a loop: changing the hash changes the binary, which changes the hash. The Docker build solves this by compiling <strong>three times</strong> until the hash stabilizes. This is called <strong>hash convergence</strong>.</p>
      <p class="act-body" style="animation:ink 0.8s 0.64s both">If you trust the project, skip this step. If you don't — and in this space, you shouldn't — verify first.</p>
      <div class="act-rule" style="animation:ink 0.8s 0.7s both"></div>
      <p class="act-body" style="animation:ink 0.8s 0.74s both"><strong>Then — download.</strong> Get the release zip from GitHub. Now you know what is inside it.</p>
      <div class="act-rule" style="animation:ink 0.8s 0.8s both"></div>
      <p class="act-body" style="animation:ink 0.8s 0.84s both"><strong>Then — install.</strong> Plug in your board, erase the flash, write the binary with <strong>esptool</strong> or <strong>espflash</strong>. That works on macOS, Linux, and Windows.</p>
      <p class="act-body" style="animation:ink 0.8s 0.92s both"><strong>On macOS</strong>, the zip includes an installer script. Open Terminal, navigate to the extracted folder, and run:</p>
      <blockquote class="act-quote" style="animation:ink 0.8s 1.0s both;font-family:'IBM Plex Mono',monospace;font-size:clamp(0.7rem,1vw,0.85rem);letter-spacing:0;">bash install.sh</blockquote>
      <p class="act-body" style="animation:ink 0.8s 1.08s both">The script asks permission at every step — just answer <strong>Y</strong> or <strong>N</strong>. It scans your machine for four build tools: <span class="tool-tip">Xcode Command Line Tools<span class="tip-box">Apple's basic build tools — compiler, linker, make. Required on macOS before anything else can compile.</span></span>, <span class="tool-tip">Rust<span class="tip-box">The programming language KasSigner is written in. Bare-metal no_std Rust. No operating system. No garbage collector.</span></span>, the <span class="tool-tip">ESP32 Rust toolchain<span class="tip-box">A modified Rust compiler that produces machine code for the ESP32-S3's Xtensa LX7 cores. Installed via espup — Espressif's toolchain manager. ~1 GB download, 5–15 minutes.</span></span>, and <span class="tool-tip">espflash<span class="tip-box">The flashing tool. Sends the compiled firmware binary to the device over USB. Also used to erase the flash before a clean install.</span></span>. Installs what is missing, then four steps: plug in, erase, build from the source you already verified, flash. You compiled it yourself. You know exactly what is on that chip.</p>
      <div class="act-rule" style="animation:ink 0.8s 1.16s both"></div>
      <p class="act-body" style="animation:ink 0.8s 1.2s both">When the firmware lands on the chip, you unplug the cable. The device boots. The screen lights up. From this moment, it has never touched the internet — and it never will.</p>
      <blockquote class="act-quote" style="animation:ink 0.8s 1.3s both">Don't trust. Verify.<br>Then download. Then install.</blockquote>`,

      <p class="act-body" style="animation:ink 0.8s 0.2s both"><strong>KasSigner</strong> runs on an <span class="tool-tip">ESP32-S3<span class="tip-box">A dual-core 240MHz microcontroller by Espressif. 512KB SRAM, 8MB PSRAM, built-in USB. Runs bare-metal Rust — no operating system, no background processes. Around $25 for the Waveshare board.</span></span> — a consumer microcontroller with a touchscreen and a camera. No operating system. No vendor libraries anywhere near the signing path.</p>
      <div class="act-rule" style="animation:ink 0.8s 0.28s both"></div>
      <p class="act-body" style="animation:ink 0.8s 0.32s both">It is <strong>not a hardware wallet</strong>. No secure element. No persistent storage. Everything lives in RAM and is wiped the moment you power off. Your backup is your seed words, not the device. What it is: an <strong>air-gapped signing device</strong>. WiFi and Bluetooth disabled permanently at boot. Data moves only through QR codes, SD card, and touchscreen.</p>
      <div class="act-rule" style="animation:ink 0.8s 0.42s both"></div>
      <p class="act-body" style="animation:ink 0.8s 0.46s both">Power it on and you see four cards. That is the entire interface.</p>
      <p class="act-body" style="animation:ink 0.8s 0.54s both"><span class="tool-tip"><strong>Scan</strong><span class="tip-box">Point the camera at a QR code. Unsigned transactions from KasSee, SeedQR imports, public keys for multisig — the device detects and decodes automatically, including multi-frame animated QR codes.</span></span> — the camera. Scan unsigned transactions from KasSee, import seeds via SeedQR, receive public keys for multisig. Multi-frame animated QR codes decoded automatically.</p>
      <p class="act-body" style="animation:ink 0.8s 0.64s both"><span class="tool-tip"><strong>Seeds</strong><span class="tip-box">Up to 16 seed slots in RAM. Each shows a fingerprint, type (12-word, 24-word, xprv, raw key), and passphrase indicator. Tap to activate. From here: view addresses, sign transactions, export kpub or xprv, show seed words, create backups.</span></span> — your wallets. Up to 16 slots in RAM, each with its own fingerprint. View addresses, sign transactions, export your public key to KasSee, create encrypted SD backups, steganographic JPEG backups, or paper SeedQR cards.</p>
      <p class="act-body" style="animation:ink 0.8s 0.74s both"><span class="tool-tip"><strong>Tools</strong><span class="tip-box">Create new seeds from hardware entropy or dice rolls. Import seeds by typing words, scanning QR, or loading from SD card. BIP85 child mnemonics. Multisig address creation. Message signing. Steganographic export.</span></span> — creation and import. Generate a new seed from hardware entropy or from physical dice rolls you can verify yourself. Import seeds and keys from SD, QR, or hex. Derive BIP85 child wallets. Create multisig addresses. Sign arbitrary messages to prove you control a key.</p>
      <p class="act-body" style="animation:ink 0.8s 0.84s both"><span class="tool-tip"><strong>Settings</strong><span class="tip-box">Display brightness, SD card formatting, device information, firmware version and hash.</span></span> — display brightness, SD card, firmware info.</p>
      <div class="act-rule" style="animation:ink 0.8s 0.9s both"></div>
      <p class="act-body" style="animation:ink 0.8s 0.94s both">The firmware is signed and verified at every boot — <strong>KasSigner</strong> checks its own integrity before it lets you do anything. Builds are reproducible. You can compile from source and confirm the binary matches what is running on the device, byte for byte.</p>
      <div class="act-rule" style="animation:ink 0.8s 1.0s both"></div>
      <p class="act-body" style="animation:ink 0.8s 1.04s both">And there is one more thing <strong>KasSigner</strong> is — a teacher. Every step is visible. You see the seed become keys. You see keys become addresses. You see UTXOs selected, transactions built, sighashes computed, signatures produced. Nothing is hidden behind an abstraction. Use it offline, disconnected from everything, and learn how this technology actually works. That is not a side effect. It is the point.</p>
      <blockquote class="act-quote" style="animation:ink 0.8s 1.14s both">Four cards. No menus to memorize.<br>A signing device. A learning machine.<br>They talk through KasSee.</blockquote>`,

    body: `
      <p class="act-body" style="animation:ink 0.8s 0.2s both"><strong>KasSigner</strong> is air-gapped. It cannot talk to the network. Something has to.</p>
      <p class="act-body" style="animation:ink 0.8s 0.3s both"><strong>KasSee</strong> is that something. A watch-only companion wallet that runs in your browser — pure Rust compiled to <span class="tool-tip">WebAssembly<span class="tip-box">A binary format that runs inside the browser at near-native speed. The code is compiled from the same Rust source as the device firmware — auditable, reproducible, no JavaScript in the crypto path.</span></span>. No server. No cloud. No accounts. Close the tab and everything is gone — zero persistence.</p>
      <div class="act-rule" style="animation:ink 0.8s 0.38s both"></div>
      <p class="act-body" style="animation:ink 0.8s 0.42s both">You give KasSee your <strong>public key</strong> — exported from <strong>KasSigner</strong> as a QR code. From that single key it derives all your addresses, connects to a Kaspa node, and queries the network for your <strong>UTXOs</strong> — the unspent outputs we talked about in the chain. Each one is a sealed envelope with an amount and a lock. KasSee can see them all. It can never open them.</p>
      <p class="act-body" style="animation:ink 0.8s 0.52s both">When you want to send, KasSee selects the UTXOs needed to cover the amount, builds the unsigned transaction — destination, value, change address — and displays it as an animated QR code. <strong>KasSigner</strong> scans it, shows you the details on its own screen, and signs. The signed transaction comes back via QR. KasSee broadcasts it to the network.</p>
      <div class="act-rule" style="animation:ink 0.8s 0.6s both"></div>
      <p class="act-body" style="animation:ink 0.8s 0.65s both">KasSee is <strong>not a security boundary</strong>. It runs in an environment you do not control — the browser, the OS, the network, the DNS. A phishing clone can show you one address and put another in the QR. Browser malware can rewrite the transaction in memory.</p>
      <p class="act-body" style="animation:ink 0.8s 0.75s both">That said, it is not defenseless either. The WebAssembly binary is compiled from the same open Rust source — you can verify it matches with a Docker reproducible build, just like the firmware. A phishing site would need to serve a different binary, and the hash would not match. That raises the bar. But it does not replace the final check: <strong>verify on the KasSigner screen</strong>. The device shows what is actually in the transaction data. Not what the browser claims.</p>
      <div class="act-rule" style="animation:ink 0.8s 0.85s both"></div>
      <p class="act-body" style="animation:ink 0.8s 0.9s both">By default KasSee connects to a public Kaspa node — zero configuration. But the node operator sees your addresses and your IP. For real sovereignty, run your own node and point KasSee at it — a reverse proxy with TLS is enough to make it work from your phone over your local network. Your node, your rules, your view of what you own.</p>

    body: `
      <p class="act-body" style="animation:ink 0.8s 0.2s both">Security is not a feature. It is a series of walls, each independent of the others. An attacker must defeat all of them — not just one.</p>
      <div class="act-rule" style="animation:ink 0.8s 0.3s both"></div>
      <p class="act-body" style="animation:ink 0.8s 0.35s both"><span class="tool-tip"><strong>Layer 1 — Air-gap.</strong><span class="tip-box">WiFi and Bluetooth radios are never initialized. Radio clocks gated at boot. USB OTG disabled. JTAG disabled. Data moves only through QR codes, SD card, and touchscreen.</span></span> No network stack. No electromagnetic channel in or out. Data moves through glass and plastic only.</p>
      <p class="act-body" style="animation:ink 0.8s 0.45s both"><span class="tool-tip"><strong>Layer 2 — Volatile keys.</strong><span class="tip-box">All key material lives in SRAM only. Mnemonic, master key, derived keys, signing nonces — all volatile. Power off and SRAM decays in milliseconds. Panic handler zeroizes RAM before halting.</span></span> Everything lives in RAM. Power off and it is gone — milliseconds. Not stored in flash. Not persisted anywhere. The panic handler wipes RAM even on a crash.</p>
      <p class="act-body" style="animation:ink 0.8s 0.55s both"><span class="tool-tip"><strong>Layer 3 — Hardware Secure Boot.</strong><span class="tip-box">ESP32-S3 ROM verifies RSA-3072 signature against a digest burned permanently into eFuse. Only firmware signed with the matching private key can execute. Silicon-level guarantee.</span></span> On eFuse devices, the ROM — immutable silicon — verifies the firmware signature before any code runs. The RSA key digest is burned permanently. Only signed firmware executes.</p>
      <p class="act-body" style="animation:ink 0.8s 0.65s both"><span class="tool-tip"><strong>Layer 4 — Software verification.</strong><span class="tip-box">SHA-256 hash of the code segment computed at runtime. Compared against the build-time embedded hash. Schnorr signature of the hash verified against the developer's public key. Hash convergence ensures self-consistency.</span></span> Independent of Secure Boot. The firmware computes its own SHA-256 hash at every boot and verifies a Schnorr signature against the developer's public key. Tampered binary — boot halts.</p>
      <p class="act-body" style="animation:ink 0.8s 0.75s both"><span class="tool-tip"><strong>Layer 5 — Rust memory safety.</strong><span class="tip-box">100% Rust, no_std. Ownership and borrow checker eliminate buffer overflows, use-after-free, null pointer dereference, uninitialized reads, double-free, data races — at compile time. Zero unsafe code in the entire signing path.</span></span> The entire signing path — parser, sighash, Schnorr, BIP32, address encoding — contains zero unsafe code. Malicious input triggers a panic and RAM wipe. Never arbitrary code execution.</p>
      <p class="act-body" style="animation:ink 0.8s 0.85s both"><span class="tool-tip"><strong>Layer 6 — Encrypted backup.</strong><span class="tip-box">AES-256-GCM with PBKDF2 key derivation (100,000 iterations). BIP39 passphrase (25th word) creates a separate derivation — without it, only a decoy wallet is accessible. The passphrase exists only in your memory.</span></span> SD backups are AES-256-GCM encrypted. Even if someone decrypts the 24 words, the real wallet lives behind a passphrase that exists only in your memory. Without it — a decoy wallet.</p>
      <p class="act-body" style="animation:ink 0.8s 0.95s both"><span class="tool-tip"><strong>Layer 7 — Steganographic hiding.</strong><span class="tip-box">Encrypted seed hidden in JPEG EXIF metadata. The photo looks ordinary. Among thousands of files, nobody knows which one matters. No safe to crack, no metal plate to find.</span></span> The encrypted seed hides inside an ordinary JPEG photo on the SD card. Nobody knows which file matters. There is no safe to crack.</p>

const connections = [
  ['ethos','chain'],['ethos','multisig'],['ethos','sovereign'],['ethos','stego'],

// ── ghost shapes ─────────────────────────────────────────
function makeGhosts(W, H) {
  const ghosts = [];
  const count = 18;
  for (let i = 0; i < count; i++) {
    const type = ['circle','ring','arc','poly'][Math.floor(Math.random()*4)];
    ghosts.push({
      type,
      x: Math.random() * W,
      y: Math.random() * H,
      r: 8 + Math.random() * 55,
      speed: (0.04 + Math.random() * 0.12) * (Math.random() > 0.5 ? 1 : -1),
      angle: Math.random() * Math.PI * 2,
      orbitR: 60 + Math.random() * 200,
      cx: Math.random() * W,
      cy: Math.random() * H,
      sides: 3 + Math.floor(Math.random() * 4),
      opacity: 0.015 + Math.random() * 0.04,
      phase: Math.random() * Math.PI * 2,
    });
  }
  return ghosts;
}

// ── star particles ──────────────────────────────────────
function makeStars(W, H) {
  const stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: 0.3 + Math.random() * 1.5,
      speed: 0.05 + Math.random() * 0.2,
      drift: (Math.random() - 0.5) * 0.3,
      phase: Math.random() * Math.PI * 2,
      bright: 0.15 + Math.random() * 0.5,
    });
  }
  return stars;
}

// ── node color scheme ───────────────────────────────────

// ── satellite orbit state ────────────────────────────────
let hoveredNode = null;
let satProgress = 0; // 0..1 emergence

// ── main canvas ──────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, ghosts = [], stars = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  ghosts = makeGhosts(W, H);
  stars = makeStars(W, H);
}
resize();
window.addEventListener('resize', resize);

function nodePos(n) {
  return { x: n.x * W, y: n.y * H };
}

// satellite positions around a node
function satPos(node, idx, total, progress) {
  const { x, y } = nodePos(node);
  const baseAngle = (idx / total) * Math.PI * 2 - Math.PI / 2;
  const orbitR = (node.r + 60) * progress;
  return {
    x: x + Math.cos(baseAngle) * orbitR,
    y: y + Math.sin(baseAngle) * orbitR,
  };
}

function drawGhost(g, t) {
  ctx.save();
  ctx.globalAlpha = g.opacity * (0.7 + 0.3 * Math.sin(t * 0.4 + g.phase));
  ctx.strokeStyle = '#1D9E75';
  ctx.lineWidth = 0.4;
  ctx.fillStyle = 'none';

  const ox = g.cx + Math.cos(g.angle + t * g.speed * 0.3) * g.orbitR;
  const oy = g.cy + Math.sin(g.angle + t * g.speed * 0.3) * g.orbitR;

  ctx.beginPath();
  if (g.type === 'circle') {
    ctx.arc(ox, oy, g.r, 0, Math.PI * 2);
    ctx.stroke();
  } else if (g.type === 'ring') {
    ctx.arc(ox, oy, g.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(ox, oy, g.r * 0.6, 0, Math.PI * 2);
    ctx.stroke();
  } else if (g.type === 'arc') {
    const start = t * g.speed + g.phase;
    ctx.arc(ox, oy, g.r, start, start + Math.PI * (0.6 + 0.4 * Math.sin(t * 0.2)));
    ctx.stroke();
  } else if (g.type === 'poly') {
    const s = g.sides;
    ctx.moveTo(ox + g.r * Math.cos(t * g.speed * 0.5), oy + g.r * Math.sin(t * g.speed * 0.5));
    for (let i = 1; i <= s; i++) {
      const a = (i / s) * Math.PI * 2 + t * g.speed * 0.5;
      ctx.lineTo(ox + g.r * Math.cos(a), oy + g.r * Math.sin(a));
    }
    ctx.closePath();
    ctx.stroke();
  }
  ctx.restore();
}

function drawStars(t) {
  stars.forEach(s => {
    s.y -= s.speed;
    s.x += s.drift;
    if (s.y < -5) { s.y = H + 5; s.x = Math.random() * W; }
    if (s.x < -5) s.x = W + 5;
    if (s.x > W + 5) s.x = -5;
    const flicker = s.bright * (0.6 + 0.4 * Math.sin(t * 2.5 + s.phase));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200, 220, 190, ${flicker})`;
    ctx.fill();
  });
}

// ── animated connection energy ──────────────────────────
function drawConnections(t) {
  connections.forEach(([a, b], ci) => {
    const na = acts.find(n => n.id === a);
    const nb = acts.find(n => n.id === b);
    const pa = nodePos(na), pb = nodePos(nb);
    const hov = na === hoveredNode || nb === hoveredNode || na === activeNode || nb === activeNode;

    // base line
    ctx.beginPath();
    ctx.moveTo(pa.x, pa.y);
    ctx.lineTo(pb.x, pb.y);
    ctx.strokeStyle = hov ? 'rgba(29,158,117,0.25)' : 'rgba(29,60,40,0.35)';
    ctx.lineWidth = hov ? 1 : 0.5;
    ctx.stroke();

    // energy particle traveling along the line
    const speed = 0.15 + ci * 0.02;
    const pos = ((t * speed + ci * 0.37) % 1);
    const ex = pa.x + (pb.x - pa.x) * pos;
    const ey = pa.y + (pb.y - pa.y) * pos;
    const eSize = hov ? 3 : 1.5;
    const eAlpha = hov ? 0.6 : 0.2;

    if (isFinite(ex) && isFinite(ey)) {
      const eGrad = ctx.createRadialGradient(ex, ey, 0, ex, ey, eSize * 4);
      eGrad.addColorStop(0, `rgba(29,158,117,${eAlpha})`);
      eGrad.addColorStop(1, 'rgba(29,158,117,0)');
      ctx.beginPath();
      ctx.arc(ex, ey, eSize * 4, 0, Math.PI * 2);
      ctx.fillStyle = eGrad;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(ex, ey, eSize, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(63,252,176,${eAlpha})`;
      ctx.fill();
    }
  });
}

let t = 0;
let activeNode = null; // currently open act

function draw() {
  try {
  ctx.clearRect(0, 0, W, H);
  t += 0.016;

  // only draw on map screen
  const inMap = document.getElementById('s-intro').classList.contains('on') ||
                !document.getElementById('s-act').classList.contains('on');

  // background stars (always)
  drawStars(t);

  // ghost shapes (always, even in intro)
  ghosts.forEach(g => drawGhost(g, t));

  if (!mapReady) { requestAnimationFrame(draw); return; }

  // connections with energy flow
  drawConnections(t);

  // satellite emergence
  const target = hoveredNode ? 1 : 0;
  satProgress += (target - satProgress) * 0.08;

  // nodes
  acts.forEach((n, i) => {
    const { x, y } = nodePos(n);
    const hov = n === hoveredNode || n === activeNode;
    const col = nodeColors[n.id] || nodeColors.chain;
    const pulse = Math.sin(t * 0.7 + i * 1.05) * 2;
    const breathe = Math.sin(t * 0.3 + i * 0.8) * 0.5 + 0.5;
    const r = n.r + (hov ? 6 : 0);

    // outer glow — radial gradient bloom
    const glowR = r + 28 + pulse * 2;
    if (isFinite(x) && isFinite(y) && isFinite(glowR) && glowR > 0) {
      const grad = ctx.createRadialGradient(x, y, r * 0.5, x, y, glowR);
      grad.addColorStop(0, hov ? col.ring.replace(/[\d.]+\)$/, '0.3)') : col.ring);
      grad.addColorStop(0.5, hov ? col.ring.replace(/[\d.]+\)$/, '0.1)') : col.ring.replace(/[\d.]+\)$/, '0.04)'));
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(x, y, glowR, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // second glow ring (breathing)
    if (hov) {
      ctx.beginPath();
      ctx.arc(x, y, r + 18 + pulse, 0, Math.PI * 2);
      ctx.strokeStyle = col.ring.replace(/[\d.]+\)$/, `${(0.15 + breathe * 0.15).toFixed(2)})`);
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }

    // node fill — 3D sphere lighting
    if (isFinite(r) && r > 0) {
      const nr = r + pulse * 0.3;
      const sp = col.sphere;

      // base sphere gradient — light source top-left
      const fillGrad = ctx.createRadialGradient(x - r * 0.35, y - r * 0.35, r * 0.05, x, y, nr);
      fillGrad.addColorStop(0, hov ? sp[0] : sp[1]);
      fillGrad.addColorStop(0.4, hov ? sp[1] : sp[2]);
      fillGrad.addColorStop(0.85, hov ? sp[2] : sp[3]);
      fillGrad.addColorStop(1, sp[3]);
      ctx.beginPath();
      ctx.arc(x, y, nr, 0, Math.PI * 2);
      ctx.fillStyle = fillGrad;
      ctx.fill();

      // specular highlight — small bright spot top-left
      const specGrad = ctx.createRadialGradient(x - r * 0.28, y - r * 0.3, 0, x - r * 0.28, y - r * 0.3, r * 0.45);
      specGrad.addColorStop(0, hov ? col.spec.replace(/[\d.]+\)$/, '0.22)') : col.spec);
      specGrad.addColorStop(0.5, hov ? col.spec.replace(/[\d.]+\)$/, '0.06)') : col.spec.replace(/[\d.]+\)$/, '0.02)'));
      specGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(x, y, nr, 0, Math.PI * 2);
      ctx.fillStyle = specGrad;
      ctx.fill();

      // rim light — bottom-right edge glow
      ctx.beginPath();
      ctx.arc(x, y, nr - 1, Math.PI * 0.1, Math.PI * 0.65);
      ctx.strokeStyle = hov ? col.rim.replace(/[\d.]+\)$/, `${(0.14 + breathe * 0.1).toFixed(2)})`) : col.rim;
      ctx.lineWidth = hov ? 1.5 : 0.8;
      ctx.stroke();
    }

    // node border
    ctx.beginPath();
    ctx.arc(x, y, r + pulse * 0.3, 0, Math.PI * 2);
    ctx.strokeStyle = hov ? col.glow : col.base;
    ctx.lineWidth = hov ? 1.2 : 0.5;
    ctx.stroke();

    // inner crescent highlight — top arc
    if (hov) {
      ctx.beginPath();
      ctx.arc(x, y, r - 3, -Math.PI * 0.8, -Math.PI * 0.2);
      ctx.strokeStyle = 'rgba(63,252,176,0.12)';
      ctx.lineWidth = 1.2;
      ctx.stroke();
    }

    // label — centered in circle
    ctx.font = hov ? '600 14px "Rubik"' : '500 12px "Rubik"';
    ctx.fillStyle = hov ? '#e0ecd8' : '#4a6858';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(n.label, x, y);

    // satellites (for hovered node)
    if (n === hoveredNode && n.satellites && n.satellites.length > 0 && satProgress > 0.02) {
      n.satellites.forEach((sat, si) => {
        const sp = satPos(n, si, n.satellites.length, satProgress);
        const sHov = isSatHovered(n, si);
        const sr = sat.r * satProgress;
        const satPulse = Math.sin(t * 1.5 + si * 2.0) * 0.5 + 0.5;

        // connector line — brighter
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(sp.x, sp.y);
        ctx.strokeStyle = `rgba(29,158,117,${0.3 * satProgress})`;
        ctx.lineWidth = 0.8;
        ctx.setLineDash([4, 4]);
        ctx.stroke();
        ctx.setLineDash([]);

        // outer glow
        if (satProgress > 0.3) {
          const glowR = sr + 10 + satPulse * 4;
          const gGrad = ctx.createRadialGradient(sp.x, sp.y, sr * 0.5, sp.x, sp.y, glowR);
          gGrad.addColorStop(0, sHov ? 'rgba(29,158,117,0.25)' : 'rgba(29,158,117,0.12)');
          gGrad.addColorStop(1, 'rgba(29,158,117,0)');
          ctx.beginPath();
          ctx.arc(sp.x, sp.y, glowR, 0, Math.PI * 2);
          ctx.fillStyle = gGrad;
          ctx.globalAlpha = satProgress;
          ctx.fill();
          ctx.globalAlpha = 1;
        }

        // pulsing ring
        if (satProgress > 0.4) {
          ctx.beginPath();
          ctx.arc(sp.x, sp.y, sr + 4 + satPulse * 3, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(29,158,117,${(sHov ? 0.5 : 0.25) * satProgress})`;
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }

        // satellite circle — brighter fill
        ctx.beginPath();
        ctx.arc(sp.x, sp.y, sr, 0, Math.PI * 2);
        ctx.fillStyle = sHov ? '#0f3828' : '#0a2418';
        ctx.fill();
        ctx.strokeStyle = sHov ? '#3ffcb0' : '#1D9E75';
        ctx.lineWidth = sHov ? 1.2 : 0.8;
        ctx.stroke();

        // satellite label — bigger, brighter, always visible once emerged
        if (satProgress > 0.3) {
          ctx.font = `400 ${Math.round(11 * satProgress)}px "IBM Plex Mono"`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = sHov ? '#e0f4ec' : '#9fcfbc';
          ctx.globalAlpha = Math.min(1, (satProgress - 0.3) * 1.5);
          ctx.fillText(sat.label, sp.x, sp.y + sr + 14);
          ctx.globalAlpha = 1;
        }
      });
    }
  });

  // center hint (map only, no active node)
  if (!activeNode) {
    ctx.font = 'italic 300 10px "Noto Serif"';
    ctx.fillStyle = '#1e2a20';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('explore', W / 2, H / 2);
  }

  } catch(e) { console.error('draw:', e); }
  requestAnimationFrame(draw);
}

function isSatHovered(node, si) {
  if (!node || node.satellites.length === 0) return false;
  const sp = satPos(node, si, node.satellites.length, satProgress);
  const sr = node.satellites[si].r * satProgress;
  return Math.hypot(MX - sp.x, MY - sp.y) < sr + 10;
}

// ── mini map ─────────────────────────────────────────────
const miniCanvas = document.getElementById('mini-canvas');
const mctx = miniCanvas.getContext('2d');
const MS = 120;

function drawMini() {
  mctx.clearRect(0, 0, MS, MS);

  // subtle circle bg
  mctx.beginPath();
  mctx.arc(MS/2, MS/2, MS/2 - 1, 0, Math.PI * 2);
  mctx.fillStyle = 'rgba(14,15,12,0.85)';
  mctx.fill();
  mctx.strokeStyle = '#1a2a1e';
  mctx.lineWidth = 0.5;
  mctx.stroke();

  // connections
  connections.forEach(([a, b]) => {
    const na = acts.find(n => n.id === a);
    const nb = acts.find(n => n.id === b);
    mctx.beginPath();
    mctx.moveTo(na.x * MS, na.y * MS);
    mctx.lineTo(nb.x * MS, nb.y * MS);
    mctx.strokeStyle = '#182218';
    mctx.lineWidth = 0.4;
    mctx.stroke();
  });

  // nodes
  acts.forEach(n => {
    const mx = n.x * MS, my = n.y * MS;
    const isActive = n === activeNode;
    const r = isActive ? 6 : 4;
    mctx.beginPath();
    mctx.arc(mx, my, r, 0, Math.PI * 2);
    mctx.fillStyle = isActive ? '#1D9E75' : '#0f1a10';
    mctx.fill();
    mctx.strokeStyle = isActive ? '#9fcfbc' : '#1a3025';
    mctx.lineWidth = 0.5;
    mctx.stroke();
  });

  // satellites of active
  if (activeNode && activeNode.satellites.length > 0) {
    const mx = activeNode.x * MS, my = activeNode.y * MS;
    activeNode.satellites.forEach((sat, si) => {
      const baseAngle = (si / activeNode.satellites.length) * Math.PI * 2 - Math.PI / 2;
      const orbitR = 18;
      const sx = mx + Math.cos(baseAngle) * orbitR;
      const sy = my + Math.sin(baseAngle) * orbitR;
      mctx.beginPath();
      mctx.arc(sx, sy, 3, 0, Math.PI * 2);
      mctx.fillStyle = '#0d5c42';
      mctx.fill();
    });
  }

  requestAnimationFrame(drawMini);
}

// ── interaction ──────────────────────────────────────────
let mapReady = false;

function initMap() {
  if (mapReady) return;
  mapReady = true;
}

// hover detection
canvas.addEventListener('mousemove', () => {
  if (!mapReady) return;
  let found = null;
  acts.forEach(n => {
    const { x, y } = nodePos(n);
    { var d = Math.hypot(MX - x, MY - y); if (d < (n.satellites && n.satellites.length > 0 ? n.r + 80 : n.r + 16)) found = n; }
  });
  hoveredNode = found;
  canvas.style.cursor = found ? 'none' : 'none';
});

// touch detection — update MX/MY from touch coordinates
canvas.addEventListener('touchstart', e => {
  if (!mapReady) return;
  const touch = e.touches[0];
  MX = touch.clientX;
  MY = touch.clientY;

  // find touched node
  let found = null;
  acts.forEach(n => {
    const { x, y } = nodePos(n);
    { var d = Math.hypot(MX - x, MY - y); if (d < (n.satellites && n.satellites.length > 0 ? n.r + 80 : n.r + 20)) found = n; }
  });

  if (found) {
    e.preventDefault();
    if (hoveredNode && hoveredNode.satellites && hoveredNode.satellites.length > 0 && satProgress > 0.5) {
      for (var si2 = 0; si2 < hoveredNode.satellites.length; si2++) {
        if (isSatHovered(hoveredNode, si2)) { openSat(hoveredNode, si2); return; }
      }
    }
    if (found.satellites && found.satellites.length > 0 && hoveredNode !== found) {
      hoveredNode = found;
    } else {
      hoveredNode = found;
      openAct(found);
    }
  }
}, { passive: false });

// click on main canvas
canvas.addEventListener('click', () => {
  if (!mapReady) return;
  // check satellites first
  if (hoveredNode && hoveredNode.satellites.length > 0) {
    for (let si = 0; si < hoveredNode.satellites.length; si++) {
      if (isSatHovered(hoveredNode, si)) {
        openSat(hoveredNode, si);
        return;
      }
    }
  }
  // check primary nodes
  acts.forEach(n => {
    const { x, y } = nodePos(n);
    if (Math.hypot(MX - x, MY - y) < n.r + 16) openAct(n);
  });
});

// click mini map
miniCanvas.addEventListener('mousemove', e => {
  const rect = miniCanvas.getBoundingClientRect();
  const scaleX = MS / rect.width;
  const scaleY = MS / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top)  * scaleY;
  let over = false;
  acts.forEach(n => {
    if (Math.hypot(mx - n.x * MS, my - n.y * MS) < 18) over = true;
  });
  miniCanvas.style.opacity = over ? '1' : '0.75';
});

miniCanvas.addEventListener('click', e => {
  const rect = miniCanvas.getBoundingClientRect();
  const scaleX = MS / rect.width;
  const scaleY = MS / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top)  * scaleY;
  acts.forEach(n => {
    const nx = n.x * MS, ny = n.y * MS;
    if (Math.hypot(mx - nx, my - ny) < 18) {
      if (n === activeNode) goToMap();
      else openAct(n);
    }
  });
});

function openAct(node) {
  activeNode = node;
  hoveredNode = null;
  satProgress = 0;
  const titleLines = node.title.split('\n').join('<br>');
  const sAct = document.getElementById('s-act');
  const diagramEl = document.getElementById('act-diagram');
  sAct.scrollTop = 0;
  sAct.style.flexDirection = 'column';
  sAct.style.alignItems = 'center';

  if (node.diagram) {
    // order: title → diagram → step text (body is removed, text comes via steps)
    document.getElementById('act-content').innerHTML = `
      <div class="act-num" style="animation:ink 0.8s both">${node.num} — ${node.id}</div>
      <h1 class="act-title" style="animation:ink 0.8s 0.1s both">${titleLines}</h1>
    `;
    diagramEl.style.display = 'block';
    diagramEl.innerHTML = node.diagram;
    sAct.style.overflowY = 'auto';
    sAct.style.overflowX = 'hidden';
    if (node.id === 'chain') setTimeout(() => initDiagramControls('st', chainStepTexts, 8), 50);
    if (node.id === 'security') setTimeout(() => initDiagramControls('sa', securityStepTexts, 6), 50);
  } else {
    document.getElementById('act-content').innerHTML = `
      <div class="act-num" style="animation:ink 0.8s both">${node.num} — ${node.id}</div>
      <h1 class="act-title" style="animation:ink 0.8s 0.1s both">${titleLines}</h1>
      ${node.body}
    `;
    diagramEl.innerHTML = '';
    diagramEl.style.display = 'none';
    sAct.style.overflow = 'auto';
  }

  show('s-act');
}

// escape — back to map
function goToMap() {
  activeNode = null;
  hoveredNode = null;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.getElementById('mini-map').classList.remove('on');
  document.getElementById('hint').style.opacity = '0';
  document.getElementById('c').style.opacity = '1';
  document.getElementById('act-diagram').style.display = 'none';
  document.getElementById('s-act').classList.remove('has-diagram');
  document.getElementById('act-wrap').style.paddingTop = '';
  document.getElementById('act-diagram').style.padding = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') goToMap();
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    if (document.getElementById('deriv-root') && window._dvGoTo) {
      e.preventDefault(); window._dvGoTo(window._dvGetCurrent() + 1);
    } else if (document.getElementById('anim-svg')) {
      e.preventDefault(); stepNext();
    }
  }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    if (document.getElementById('deriv-root') && window._dvGoTo) {
      e.preventDefault(); window._dvGoTo(window._dvGetCurrent() - 1);
    } else if (document.getElementById('anim-svg')) {
      e.preventDefault(); stepBack();
    }
  }
});

// hint click also returns
document.getElementById('hint').addEventListener('click', goToMap);

// intro → map
const introHandler = () => {
  initMap();
  document.getElementById('s-intro').classList.remove('on');
  document.getElementById('hint').style.opacity = '0';
  mapReady = true;
};
document.getElementById('s-intro').addEventListener('click', introHandler);
document.getElementById('s-intro').addEventListener('touchend', e => {
  e.preventDefault();
  introHandler();
});

const chainStepTexts = ['', 'Your keys exist in two forms. The public key is known to the network — it lives inside every unspent output (UTXO) as the lock. The private key lives only on KasSigner. It never leaves.', 'Someone wants to send Kaspa. KasSee — running locally on your machine — knows your public key and finds your UTXOs. It builds the unsigned transaction: destination, amount, change.', 'KasSee asks the node for the full UTXO details — the value and the locking script. It needs this to build a valid signature request. Without it, the device cannot sign correctly.', 'KasSee packages the unsigned transaction and the UTXO data together and sends everything to KasSigner as a QR code. The public key travels with it.', 'KasSigner receives the package and builds the sighash — a Blake2b digest that binds the amount, the destination, and the locking script into a single 32-byte fingerprint. This is what will be signed.', 'Before signing anything, KasSigner shows you the amount and the recipient address on its own screen. A screen that has never touched the internet. You verify. You confirm physically.', 'Only after your confirmation does KasSigner use the private key. Schnorr signature over the sighash digest. The private key is used and stays. It does not leave the device.', 'The signature returns to KasSee via QR. KasSee broadcasts the complete transaction to the network. The node verifies the signature against the UTXO lock. If it matches — the funds move.'];
const securityStepTexts = ['', 'Stolen SD card. No device needed — just grab the card. Three barriers. AES-256-GCM encryption — without the password, the data is noise. Steganographic hiding — the encrypted seed lives inside a JPEG photo as EXIF metadata. Thousands of photos, nobody knows which one matters. BIP39 passphrase — even if someone gets the 24 words, those words lead to a decoy wallet. The real funds live behind a passphrase that exists only in your memory. Blocked.', 'Physical access, device powered off. The attacker has the hardware. But the keys lived in volatile RAM. Power is gone. SRAM decays in milliseconds. There is nothing to extract. Blocked.', 'Physical access, device powered on. The only vulnerable state. Keys are in RAM. An attacker with lab equipment — voltage glitching, cold boot probes, EM side-channel — could theoretically extract them. JTAG is permanently disabled via eFuse. The window is as long as the device stays on with a seed loaded. Mitigation: sign, then power off immediately.', 'Fake firmware. Cloned repo, phishing download, modified binary — you install without checking. Three barriers. Docker verification — build it yourself, compare the SHA-256 hash. eFuse Secure Boot — the ROM rejects anything not signed with the RSA-3072 key burned into silicon. Schnorr signature — firmware checks its own hash at every boot. Blocked.', 'Malware QR or SD card. Craft a payload that exploits a parser bug to execute arbitrary code. Every parser in the signing path is safe Rust — zero unsafe blocks. Out-of-bounds access triggers a controlled panic. The panic handler wipes all RAM before halting. No code execution. Blocked.', 'KasSee phishing. Cloned web app or browser malware modifies the transaction. The screen shows the right address, but the QR contains a different one — the attacker gets paid instead of you. Defense: verify the destination on the KasSigner screen. The device shows what is actually in the data. Five attacks blocked by technology. One requires the user to look.'];
let currentStep = 0;
let currentPrefix = 'st';
let currentTexts = chainStepTexts;
let currentTotal = 8;

function updateSteps() {
  for (let i = 0; i <= currentTotal; i++) {
    const el = document.getElementById(currentPrefix + i);
    if (el) el.classList.toggle('on', i <= currentStep);
  }
  const lbl = document.getElementById('step-label');
  const btnB = document.getElementById('btn-back');
  const btnN = document.getElementById('btn-next');
  const txt = document.getElementById('step-text');
  if (lbl) lbl.textContent = 'step ' + currentStep + ' of ' + currentTotal;
  if (btnB) { btnB.disabled = currentStep === 0; btnB.style.opacity = currentStep === 0 ? '0.3' : '1'; }
  if (btnN) { btnN.disabled = currentStep === currentTotal; btnN.style.opacity = currentStep === currentTotal ? '0.3' : '1'; btnN.textContent = currentStep === currentTotal ? 'done ✓' : 'next →'; }
  if (txt) {
    txt.style.opacity = '0';
    setTimeout(() => {
      txt.textContent = currentTexts[currentStep] || '';
      txt.style.opacity = currentTexts[currentStep] ? '1' : '0';
    }, 200);
  }
  if (currentStep === 1) {
    const sAct = document.getElementById('s-act');
    const wrap = document.getElementById('act-wrap');
    if (sAct && wrap) setTimeout(() => sAct.scrollTo({ top: wrap.offsetHeight, behavior: 'smooth' }), 100);
  }
}

function stepNext() { if (currentStep < currentTotal) { currentStep++; updateSteps(); } }
function stepBack() { if (currentStep > 0) { currentStep--; updateSteps(); } }

function initDiagramControls(prefix, texts, total) {
  currentPrefix = prefix;
  currentTexts = texts;
  currentTotal = total;
  currentStep = 0;
  updateSteps();
  const svg = document.getElementById('anim-svg');
  const btnN = document.getElementById('btn-next');
  const btnB = document.getElementById('btn-back');
  if (svg) svg.addEventListener('click', stepNext);
  if (btnN) btnN.addEventListener('click', e => { e.stopPropagation(); stepNext(); });
  if (btnB) btnB.addEventListener('click', e => { e.stopPropagation(); stepBack(); });
}

// start loops
draw();
drawMini();

// ── tooltip touch support ────────────────────────────────
document.addEventListener('click', e => {
  const tip = e.target.closest('.tool-tip');
  document.querySelectorAll('.tool-tip.active').forEach(el => {
    if (el !== tip) el.classList.remove('active');
  });
  if (tip) {
    e.preventDefault();
    e.stopPropagation();
    tip.classList.toggle('active');
  }
});
</script>
